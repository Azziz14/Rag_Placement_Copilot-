name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8 lint
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

  backend-test:
    name: Backend — Import Smoke Test
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    env:
      PROJECT_NAME: "InterviewPilot-AI"
      API_V1_STR: "/api/v1"
      GEMINI_API_KEY: "dummy-key-for-ci"
      GEMINI_MODEL: "gemini-2.5-flash"
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder-key"
      SUPABASE_JWT_SECRET: "placeholder-secret"
      BACKEND_CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Smoke test — imports
        run: python test_imports.py

  frontend-lint:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"
