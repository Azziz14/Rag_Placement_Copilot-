services:
  - type: web
    name: interviewpilot-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_db
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
